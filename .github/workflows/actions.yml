name: Update Movie Data

on:
  schedule:
    - cron: "0 0 * * *" # Every day at midnight (00:00 AM UTC)
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch.py
        env:
          YOUR_TOKEN: ${{ secrets.YOUR_TOKEN }}
        run: python backend/fetch.py

      - name: Run clean.py
        run: python backend/clean.py

      - name: Run recommend.py
        run: python backend/recommend.py

      - name: Write success log
        if: success()
        run: |
          mkdir -p logs
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ✅ Automation ran successfully." >> logs/automation.log

      - name: Write failure log
        if: failure()
        run: |
          mkdir -p logs
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ❌ Automation FAILED. Check GitHub Actions for details." >> logs/automation.log

      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || (git commit -a -m "🤖 Auto-update movie data" --allow-empty)

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
